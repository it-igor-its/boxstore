services:
  php:
    build:
      context: ./docker/php
    container_name: boxstore_php
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: yii2_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yii2advanced
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: yii2_pma
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    container_name: boxstore_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php